version: '3.8'

services:
  # ── Reverse Proxy (Nginx) ────────────────────────────────────
  proxy:
    build: ./nginx
    ports: ["80:80"]
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - portal
      - idor-vuln
      - idor-fixed
      - misconfig-vuln
      - misconfig-fixed
      - supply-chain-vuln
      - supply-chain-fixed
      - crypto-vuln
      - crypto-fixed
      - sqli-vuln
      - sqli-fixed
    restart: unless-stopped

  # ── Portal de inicio ────────────────────────────────────────
  portal:
    build: ./portal
    environment:
      - DOMAIN=${DOMAIN}
    restart: unless-stopped

  # ── A01:2025 — Broken Access Control (IDOR) ─────────────────
  idor-vuln:
    build: ./idor
    environment: [SECURE=false]
    restart: unless-stopped

  idor-fixed:
    build: ./idor
    environment: [SECURE=true]
    restart: unless-stopped

  # ── A02:2025 — Security Misconfiguration ────────────────────
  misconfig-vuln:
    build: ./misconfig
    environment: [SECURE=false]
    restart: unless-stopped

  misconfig-fixed:
    build: ./misconfig
    environment: [SECURE=true]
    restart: unless-stopped

  # ── A03:2025 — Software Supply Chain Failures ───────────────
  supply-chain-vuln:
    build: ./supply-chain
    environment: [SECURE=false]
    restart: unless-stopped

  supply-chain-fixed:
    build: ./supply-chain
    environment: [SECURE=true]
    restart: unless-stopped

  # ── A04:2025 — Cryptographic Failures ───────────────────────
  crypto-vuln:
    build: ./crypto
    environment: [SECURE=false]
    restart: unless-stopped

  crypto-fixed:
    build: ./crypto
    environment: [SECURE=true]
    restart: unless-stopped

  # ── A05:2025 — Injection (SQL Injection) ────────────────────
  sqli-vuln:
    build: ./sqli
    environment: [SECURE=false]
    restart: unless-stopped

  sqli-fixed:
    build: ./sqli
    environment: [SECURE=true]
    restart: unless-stopped
